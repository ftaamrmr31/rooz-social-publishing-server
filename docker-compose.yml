version: '3.8'

services:
  api:
    build: .
    container_name: rooz-api
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - ENVIRONMENT=development
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - rooz-network

networks:
  rooz-network:
    driver: bridge